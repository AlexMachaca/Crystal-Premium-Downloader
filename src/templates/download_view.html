<!-- Hero -->
<div class="max-w-2xl w-full text-center mb-12 animate-fade-in">
    <div class="inline-flex items-center gap-2 crystal-glass px-4 py-1.5 rounded-full mb-6 text-[11px] font-black uppercase tracking-[0.15em] text-white/50">
        <span class="w-1.5 h-1.5 bg-red-500 rounded-full animate-pulse"></span>
        Crystal Downloader
    </div>
    <h1 class="text-5xl md:text-7xl font-black mb-5 tracking-tighter leading-[0.9] bg-clip-text text-transparent bg-gradient-to-b from-white via-white/90 to-white/30">
        Captura<br>el Sonido.
    </h1>
    <p class="text-white/35 text-base md:text-lg font-medium tracking-tight max-w-sm mx-auto">
        Pega un enlace de YouTube y convierte en segundos.
    </p>

    <!-- Feature pills -->
    <div class="flex flex-wrap items-center justify-center gap-2 mt-6">
        <span class="crystal-glass text-[10px] font-black uppercase tracking-widest text-white/40 px-3 py-1.5 rounded-full">MP3 • MP4</span>
        <span class="crystal-glass text-[10px] font-black uppercase tracking-widest text-white/40 px-3 py-1.5 rounded-full">Calidad premium</span>
        <span class="crystal-glass text-[10px] font-black uppercase tracking-widest text-white/40 px-3 py-1.5 rounded-full">Biblioteca offline</span>
    </div>
</div>

<!-- Input Liquid Glass -->
<div class="max-w-3xl w-full mb-12 animate-fade-in">
    <form hx-post="/ui/info" hx-target="#result-container" hx-indicator="#loading-indicator"
          class="lg-input rounded-[32px] p-2 flex flex-col md:flex-row gap-2">
        <input
            type="url"
            name="url"
            placeholder="https://youtube.com/watch?v=..."
            required
            class="flex-grow bg-transparent outline-none text-white text-base font-medium px-5 py-4 placeholder:text-white/20 min-w-0"
        >
        <button
            type="submit"
            class="btn-lg-primary font-black py-4 px-8 rounded-[24px] text-base flex items-center justify-center gap-3 active:scale-95 whitespace-nowrap"
        >
            <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5">
                <path stroke-linecap="round" stroke-linejoin="round" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/>
            </svg>
            <span>Analizar</span>
            <div id="loading-indicator" class="htmx-indicator">
                <svg class="animate-spin h-4 w-4 text-black" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
                    <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                    <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
                </svg>
            </div>
        </button>
    </form>
</div>

<!-- Contenedor de resultados -->
<div id="result-container" class="max-w-3xl w-full">
    <!-- Los fragmentos de HTML aparecerán aquí -->
</div>
