{% for song in songs %}
<div class="crystal-glass p-4 rounded-[28px] flex items-center gap-5 animate-fade-in group hover:bg-white/10 transition-all cursor-pointer active:scale-95 shadow-xl relative overflow-hidden"
     onclick="playSong('{{ song.id }}', '{{ song.title }}', '{{ song.artist }}', '{{ song.thumbnail_url }}')">
    
    <!-- Reflejo interior -->
    <div class="absolute inset-0 bg-gradient-to-br from-white/10 to-transparent pointer-events-none"></div>

    <div class="relative w-16 h-16 flex-shrink-0">
        <img src="{{ song.thumbnail_url }}" class="w-full h-full object-cover rounded-2xl shadow-2xl">
        <div class="absolute inset-0 flex items-center justify-center bg-black/20 opacity-0 group-hover:opacity-100 transition-opacity rounded-2xl">
            <div class="w-10 h-10 flex items-center justify-center bg-white/20 backdrop-blur-md rounded-full border border-white/30">
                <svg class="w-6 h-6 text-white fill-current" viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
            </div>
        </div>
    </div>
    
    <div class="flex-grow min-w-0">
        <h3 class="text-white text-[15px] font-black tracking-tight truncate leading-tight mb-0.5">{{ song.title }}</h3>
        <p class="text-white/40 text-[12px] font-bold uppercase tracking-widest truncate">{{ song.artist }}</p>
    </div>
    
    <div class="text-white/20 text-[11px] font-black tracking-tighter pr-2">
        {{ (song.duration // 60) }}:{{ "%02d" | format(song.duration % 60) }}
    </div>
</div>
{% endfor %}

{% if not songs %}
<div class="text-center py-24 animate-fade-in">
    <div class="w-20 h-20 bg-white/5 rounded-full flex items-center justify-center mx-auto mb-6 border border-white/5">
        <svg class="w-10 h-10 text-white/10" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M9 19V6l12-3v13M9 19c0 1.105-1.343 2-3 2s-3-.895-3-2 1.343-2 3-2 3 .895 3 2zm12-3c0 1.105-1.343 2-3 2s-3-.895-3-2 1.343-2 3-2 3 .895 3 2zM9 10l12-3"/>
        </svg>
    </div>
    <p class="text-white/30 font-black uppercase tracking-[0.2em] text-xs">Vibra el silencio.</p>
</div>
{% endif %}
